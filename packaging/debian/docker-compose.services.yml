# Docker Compose for Cortex dependencies (IndentiaGraph on SurrealDB)
#
# Usage:
#   cd /etc/cortex
#   docker compose -f docker-compose.services.yml up -d
#
# This only runs the required services. Cortex itself runs as a
# systemd service (installed via the .deb package).

services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: cortex-surrealdb
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: >
      start
      --log info
      --user ${SURREALDB_USER:-root}
      --pass ${SURREALDB_PASSWORD:-change-me}
      rocksdb:/data/indentiagraph.db
    volumes:
      - surrealdb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  surrealdb_data:
