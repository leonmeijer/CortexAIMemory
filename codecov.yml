codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        # The chat module contains WebSocket handlers and streaming logic
        # that requires a live CLI subprocess and WS connections.
        # Unit tests cover the testable business logic but cannot cover
        # infrastructure code (ws_chat_handler.rs, stream_response internals).
        target: 30%
        threshold: 5%

ignore:
  # Desktop Tauri app — separate crate, not compiled by cargo llvm-cov
  - "desktop/**"
  # Chat infrastructure — requires live CLI subprocess, WS connections, and
  # streaming pipelines. Business logic is tested via mock-based unit tests
  # but the send/stream/persist pipeline is integration-only.
  - "src/api/ws_chat_handler.rs"
  - "src/api/chat_handlers.rs"
  - "src/chat/**"
  # IndentiaGraph client — all methods require a running IndentiaGraph instance.
  # Tested by integration tests (ci.yml: integration-tests, api-tests jobs).
  # Unit tests use MockGraphStore (mock.rs) which is fully covered.
  # Note: client.rs was decomposed into domain files — all need live IndentiaGraph.
  - "src/indentiagraph/client.rs"
  - "src/indentiagraph/impl_graph_store.rs"
  - "src/indentiagraph/analytics.rs"
  - "src/indentiagraph/chat.rs"
  - "src/indentiagraph/code.rs"
  - "src/indentiagraph/commit.rs"
  - "src/indentiagraph/constraint.rs"
  - "src/indentiagraph/decision.rs"
  - "src/indentiagraph/feature_graph.rs"
  - "src/indentiagraph/milestone.rs"
  - "src/indentiagraph/note.rs"
  - "src/indentiagraph/plan.rs"
  - "src/indentiagraph/project.rs"
  - "src/indentiagraph/release.rs"
  - "src/indentiagraph/step.rs"
  - "src/indentiagraph/task.rs"
  - "src/indentiagraph/user.rs"
  - "src/indentiagraph/workspace.rs"
  # Server bootstrap — start_server / start_setup_server bind Axum servers,
  # read env vars, and configure middleware. Pure infrastructure, not unit-testable.
  # Covered by integration/API tests (ci.yml jobs).
  - "src/lib.rs"
  # Main entry points
  - "src/main.rs"
  - "src/bin/**"
