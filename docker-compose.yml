services:
  indentiagraph:
    image: surrealdb/surrealdb:latest
    container_name: orchestrator-indentiagraph
    ports:
      - "8000:8000"
    command: >
      start
      --log info
      --user ${SURREALDB_USER:-root}
      --pass ${SURREALDB_PASSWORD:-orchestrator123}
      rocksdb:/data/indentiagraph.db
    volumes:
      - indentiagraph_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - orchestrator-net

  meilisearch:
    image: getmeili/meilisearch:v1.34.2
    container_name: orchestrator-meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=orchestrator-meili-key-change-me
      - MEILI_ENV=development
      - MEILI_LOG_LEVEL=INFO
      - MEILI_MAX_INDEXING_MEMORY=512MiB
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orchestrator-net

  nats:
    image: nats:2.11-alpine
    container_name: orchestrator-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222", "--jetstream"]
    volumes:
      - nats_data:/data/jetstream
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orchestrator-net

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        FRONTEND_SRC: ./frontend
    container_name: orchestrator-server
    ports:
      - "8080:8080"
    environment:
      - INDENTIAGRAPH_URI=ws://indentiagraph:8000
      - INDENTIAGRAPH_USER=${SURREALDB_USER:-root}
      - INDENTIAGRAPH_PASSWORD=${SURREALDB_PASSWORD:-orchestrator123}
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=orchestrator-meili-key-change-me
      - RUST_LOG=info,project_orchestrator=debug
      - WORKSPACE_PATH=/workspace
      - NATS_URL=nats://nats:4222
    depends_on:
      indentiagraph:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./workspace:/workspace:ro
      - orchestrator_data:/data
    networks:
      - orchestrator-net

volumes:
  indentiagraph_data:
  meilisearch_data:
  nats_data:
  orchestrator_data:

networks:
  orchestrator-net:
    driver: bridge
