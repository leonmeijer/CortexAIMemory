# =============================================================================
# Project Orchestrator — Production Docker Compose
# =============================================================================

services:
  indentiagraph:
    image: surrealdb/surrealdb:latest
    container_name: orchestrator-indentiagraph
    restart: unless-stopped
    ports:
      - "${INDENTIAGRAPH_PORT:-8000}:8000"
    command: >
      start
      --log info
      --user ${INDENTIAGRAPH_USER:-root}
      --pass ${INDENTIAGRAPH_PASSWORD:-change-me-please}
      rocksdb:/data/indentiagraph.db
    volumes:
      - indentiagraph-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - orchestrator

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: orchestrator-meilisearch
    restart: unless-stopped
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-change-me-please}
      - MEILI_ENV=production
      - MEILI_LOG_LEVEL=INFO
      - MEILI_MAX_INDEXING_MEMORY=${MEILISEARCH_MAX_MEMORY:-512MiB}
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orchestrator

  nats:
    image: nats:2.11-alpine
    container_name: orchestrator-nats
    restart: unless-stopped
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    command: ["--http_port", "8222", "--jetstream"]
    volumes:
      - nats-data:/data/jetstream
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orchestrator

  orchestrator:
    image: ghcr.io/this-rs/project-orchestrator:${ORCHESTRATOR_IMAGE_TAG:-latest}
    container_name: orchestrator-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - INDENTIAGRAPH_URI=ws://indentiagraph:8000
      - INDENTIAGRAPH_USER=${INDENTIAGRAPH_USER:-root}
      - INDENTIAGRAPH_PASSWORD=${INDENTIAGRAPH_PASSWORD:-change-me-please}
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_MASTER_KEY:-change-me-please}
      - RUST_LOG=${RUST_LOG:-info,project_orchestrator=debug}
      - WORKSPACE_PATH=/workspace
      - SERVE_FRONTEND=${SERVE_FRONTEND:-true}
      - FRONTEND_PATH=/app/dist
      - NATS_URL=nats://nats:4222
    depends_on:
      indentiagraph:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - orchestrator-data:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - orchestrator

volumes:
  indentiagraph-data:
  meilisearch-data:
  nats-data:
  orchestrator-data:

networks:
  orchestrator:
    driver: bridge
